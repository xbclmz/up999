<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史答案</title>
    <style>
        .container { display: flex; flex-wrap: wrap; gap: 10px; }
        .card { min-width: 300px; }
    </style>
</head>
<body>
    <div id="app"></div>
    <br><br>
    <a href="more.html">返回答案列表</a>

    <script src="data.js"></script>
    <script>
        const id = new URLSearchParams(location.search).get('id');
        const item = DATA.find(d => d.id === id);

        if (!item) {
            document.getElementById('app').innerHTML = '<p>未找到该答案</p>';
        } else if (item.cards) {
            document.getElementById('app').innerHTML =
                '<div class="container">' +
                item.cards.map(c =>
                    '<div class="card"><h2>' + c.title + '</h2>' +
                    '<div style="white-space:pre-wrap">' + c.answers + '</div></div>'
                ).join('') +
                '</div>';
        } else {
            document.getElementById('app').innerHTML =
                '<h2>' + item.title + '</h2>' +
                '<div style="white-space:pre-wrap">' + item.answers + '</div>';
        }
    </script>
</body>
</html>
