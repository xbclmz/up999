<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>历史答案列表</title>
    <link rel="icon" href="data:,">
</head>
<body>
    <div id="list"></div>
    <br><br>
    <a href="index.html">返回最新答案</a>

    <script src="data.js"></script>
    <script>
        // 跳过第一条（最新的已在首页展示），其余作为历史
        const history = DATA.slice(1);
        document.getElementById('list').innerHTML = history.map(item => {
            const title = item.title || item.cards.map(c => c.title).join(' / ');
            return '<p><a href="answer.html?id=' + item.id + '">' + title + '</a></p>';
        }).join('');
    </script>
</body>
